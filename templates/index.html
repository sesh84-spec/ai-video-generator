<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор видео</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
            color: #222;
        }

        .container {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
        }

        p {
            color: #555;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            margin-top: 16px;
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #222;
            color: #fff;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            display: none;
        }

        .progress-wrapper {
            margin-top: 12px;
            width: 100%;
            height: 24px;
            background: #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #222;
            transition: width 0.4s ease;
        }

        .muted {
            color: #666;
            font-size: 14px;
        }

        .download-link {
            display: none;
            margin-top: 16px;
        }

        .download-link a {
            display: inline-block;
            padding: 12px 18px;
            background: #0a7f2e;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }

        .error {
            color: #b00020;
            margin-top: 12px;
            white-space: pre-wrap;
        }

        .task-id {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Генератор видео</h1>
    <p>Введите описание видео и запустите генерацию.</p>

    <textarea id="prompt" placeholder="Например: Современный загородный дом среди сосновых деревьев на закате, тёплый свет в окнах, спокойное движение камеры вперёд."></textarea>

    <button id="generateBtn">Создать видео</button>

    <div class="status-box" id="statusBox">
        <div><strong>Статус:</strong> <span id="statusText">Ожидание</span></div>
        <div class="task-id"><strong>Task ID:</strong> <span id="taskIdText">—</span></div>

        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="muted" id="progressValue">0%</div>
        <div class="error" id="errorText"></div>

        <div class="download-link" id="downloadBlock">
            <a id="downloadLink" href="#" download>Скачать видео</a>
        </div>
    </div>
</div>

<script>
    const promptEl = document.getElementById('prompt');
    const generateBtn = document.getElementById('generateBtn');
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('progressBar');
    const progressValue = document.getElementById('progressValue');
    const errorText = document.getElementById('errorText');
    const downloadBlock = document.getElementById('downloadBlock');
    const downloadLink = document.getElementById('downloadLink');
    const taskIdText = document.getElementById('taskIdText');

    let currentTaskId = null;
    let pollTimer = null;

    function setProgress(value) {
        const safeValue = Math.max(0, Math.min(100, Number(value) || 0));
        progressBar.style.width = safeValue + '%';
        progressValue.textContent = safeValue.toFixed(1) + '%';
    }

    function setStatus(message) {
        statusText.textContent = message || 'Ожидание';
    }

    function showError(message) {
        errorText.textContent = message || '';
    }

    function resetUIForNewTask() {
        statusBox.style.display = 'block';
        downloadBlock.style.display = 'none';
        downloadLink.href = '#';
        showError('');
        setProgress(0);
        setStatus('Задача отправлена');
        taskIdText.textContent = '—';
    }

    function stopPolling() {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
    }

    async function pollStatus(taskId) {
        try {
            const response = await fetch(`/status/${taskId}`);
            const data = await response.json();

            if (!response.ok) {
                showError(data.error || 'Ошибка получения статуса');
                stopPolling();
                generateBtn.disabled = false;
                return;
            }

            taskIdText.textContent = taskId;
            setStatus(data.message || data.status || 'Обработка');
            setProgress(data.progress || 0);

            if (data.status === 'completed') {
                stopPolling();
                generateBtn.disabled = false;
                downloadLink.href = `/download/${taskId}`;
                downloadBlock.style.display = 'block';
            } else if (data.status === 'failed' || data.status === 'error') {
                stopPolling();
                generateBtn.disabled = false;
                showError(data.message || 'Произошла ошибка');
            }
        } catch (error) {
            showError('Ошибка связи с сервером: ' + error.message);
            stopPolling();
            generateBtn.disabled = false;
        }
    }

    generateBtn.addEventListener('click', async () => {
        const prompt = promptEl.value.trim();

        if (!prompt) {
            alert('Введите промпт');
            return;
        }

        stopPolling();
        resetUIForNewTask();
        generateBtn.disabled = true;

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ prompt })
            });

            const data = await response.json();

            if (!response.ok) {
                generateBtn.disabled = false;
                showError(data.error || 'Ошибка запуска генерации');
                return;
            }

            currentTaskId = data.task_id;
            taskIdText.textContent = currentTaskId;

            pollStatus(currentTaskId);
            pollTimer = setInterval(() => pollStatus(currentTaskId), 5000);

        } catch (error) {
            generateBtn.disabled = false;
            showError('Ошибка связи с сервером: ' + error.message);
        }
    });
</script>
</body>
</html>
